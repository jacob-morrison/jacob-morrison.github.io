# Publications data file. Single source of truth for both the home-page
# Selected Publications section and the /publications full archive.
#
# Schema:
#   title         (required) — paper title; HTML allowed if you really need it
#   url           (required) — primary link the title points to
#   authors       (required) — HTML string; wrap your name in <strong>...</strong>
#   year          (required) — integer; controls year-grouping on /publications
#   selected      (optional) — true to surface on the home page
#   order         (optional) — sort key for selected papers (lower = earlier)
#   venues        (required) — list; most papers have one entry, some have two
#                              when accepted at multiple venues
#   venues[].text    (required) — venue name (rendered in italics)
#   venues[].links   (optional) — [{label, url}, ...] rendered as pill buttons
#   venues[].award   (optional) — short award string (rendered in accent color)

