{%- comment -%}
  Shared profile sidebar, used by all layouts.
  Pass `show_back=true` from sub-pages to render a "Back to home" link.
{%- endcomment -%}
<aside class="profile">
  <img src="{{ '/assets/images/profile.jpg' | relative_url }}" alt="Jacob Morrison" class="profile-photo">
  <h1 class="profile-name">Jacob Morrison</h1>
  <div class="profile-affiliations">
    Ph.D. Student, <a href="https://www.cs.washington.edu/">UW CSE</a><br>
    Student Researcher, <a href="https://allenai.org/">Ai2</a>
  </div>

  <div class="social-icons">
    <a href="mailto:jacob@jacobmorrison.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
    <a href="https://bsky.app/profile/jacobcares.bsky.social" aria-label="Bluesky"><i class="fa-brands fa-bluesky"></i></a>
    <a href="https://linkedin.com/in/jacob-morrison" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
    <a href="https://scholar.google.com/citations?user=AZgHehoAAAAJ&hl=en" aria-label="Google Scholar"><i class="ai ai-google-scholar"></i></a>
    <a href="https://github.com/jacob-morrison" aria-label="GitHub"><i class="fab fa-github"></i></a>
  </div>

  <div style="text-align:center; margin-bottom: 0.5rem;">
    <a href="{{ '/assets/CV-Mar-26.pdf' | relative_url }}" style="font-size: 0.9rem;">Curriculum Vitae &rarr;</a>
  </div>

  {%- if include.show_back %}
  <div class="sidebar-back">
    <a href="{{ '/' | relative_url }}">&larr; Back to home</a>
  </div>
  {%- endif %}
</aside>
